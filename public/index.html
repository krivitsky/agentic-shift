<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Shift — Munich, June 27, 2026</title>
  <meta name="description" content="Agentic Shift Conference. Munich, June 27, 2026.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/terminal.css">
</head>
<body>
  <div id="terminal-wrapper">
    <div id="terminal-frame">
      <div id="title-bar">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="title-text">agentic-shift</span>
      </div>
      <div id="terminal">
        <div id="output"></div>
        <div id="input-line" class="hidden">
          <span class="prompt">&gt;</span>
          <input id="command-input" type="text" spellcheck="false" autocomplete="off" autofocus>
          <span class="cursor"></span>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/terminal.js"></script>
</body>
</html>
